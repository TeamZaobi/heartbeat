trigger:
  id: heartbeat.project-owner.fast-lane
  target_agent: project-owner
  source: schedule
  cadence: "*/15 * * * *"
  workflow_ref: null
  node_ref: null
  target_thread: null
  source_threads: []
  payload:
    truth_refs:
      - docs/project-status.md
      - docs/requirements/
    artifact_refs:
      - artifacts/latest-validation/
    last_run_state: state/heartbeat-project-owner.json
    resume_token: null
  outcome_contract_ref: artifacts/outcome-contract.yaml
  context_policy:
    mode: continuous_thread
    inherit_previous_turn: true
    read_self_history: false
    read_policy:
      default: inherit_context
      read_project_truth_when:
        - gate_changed
        - authority_level_changes
        - entering_implementation_runtime_or_release_admission
        - context_discontinuity
    no_change_response: continue_previous
    heavy_refresh_triggers:
      - explicit_human_request
      - boundary_violation
      - repeated_noop
      - repeated_shallow_packets
      - failed_validation
  batch_mode: work_batch
  isolation:
    worktree: optional
    sandbox: project_write_only
  permissions:
    observe: true
    write_draft: true
    write_truth: false
    pause_self: true
    modify_others: false
    modify_subordinate_schedule: true
    delete_self: false
  next_policy:
    if_no_change: suppress_or_backoff
    if_progress: continue
    if_blocked: route_to_owner_agent
    if_repeated_noise: pause
    if_stage_changed: rewrite_prompt_or_schedule
